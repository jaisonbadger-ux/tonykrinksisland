<style>
:root{--bg:#0d1117;--text:#c9d1d9;--border:#21262d;--blue:#58a6ff;--green:#3fb950;--gold:#d4a017;--cyan:#39c5cf;--pink:#f778ba;--red:#f85149;--dim:#484f58;--muted:#8b949e;--neon:#00ff41;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Fira Code',monospace;font-size:13px;overflow:hidden;}
#topbar{background:#010409;border-bottom:1px solid var(--border);padding:0 14px;height:36px;display:flex;align-items:center;flex-shrink:0;z-index:100;}
.tb-tab{padding:0 14px;height:100%;display:flex;align-items:center;color:var(--muted);text-decoration:none;border-right:1px solid var(--border);font-size:11px;white-space:nowrap;transition:color .15s;}
.tb-tab:hover{color:var(--text);}
.tb-tab.active{color:var(--neon);border-bottom:2px solid var(--neon);}
.tb-title{color:var(--gold);font-weight:600;padding:0 14px;border-right:1px solid var(--border);font-size:11px;}
.tb-spacer{flex:1;}
#wrap{display:flex;flex-direction:column;height:calc(100vh - 36px);}
#scoreboard{background:#010409;border-bottom:1px solid var(--border);padding:5px 12px;display:flex;align-items:center;gap:14px;flex-shrink:0;overflow:hidden;}
.sc-item{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.sc-label{font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;}
.sc-val{font-family:'Press Start 2P',monospace;font-size:12px;color:#fff;line-height:1.4;}
.sc-val.runs{color:var(--gold);}.sc-val.wickets{color:var(--red);}.sc-val.overs{color:var(--cyan);}
.sc-div{width:1px;height:28px;background:var(--border);flex-shrink:0;}
#sc-batter-wrap{display:flex;flex-direction:column;flex-shrink:0;}
#sc-batter{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--neon);line-height:1.3;white-space:nowrap;}
#sc-batter-score{font-size:9px;color:var(--muted);}
#commentary{flex:1;font-size:10px;color:var(--muted);padding:0 10px;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
#main{flex:1;display:flex;overflow:hidden;}
#game-area{flex:1;position:relative;overflow:hidden;}
#gameCanvas{display:block;width:100%;height:100%;}

#ball-label{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-family:'Press Start 2P',monospace;font-size:10px;padding:5px 12px;border:1px solid;opacity:0;transition:opacity .25s;pointer-events:none;z-index:10;text-align:center;}
#ball-label.show{opacity:1;}

#key-guide{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;z-index:10;}
.kg-row{display:flex;gap:4px;}
.kk{font-family:'Press Start 2P',monospace;font-size:8px;width:56px;height:52px;border:2px solid var(--dim);color:var(--dim);background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:default;user-select:none;-webkit-user-select:none;transition:all .06s;letter-spacing:.5px;pointer-events:none;}
.kk span{font-size:6px;margin-top:3px;color:inherit;opacity:0.8;}
.kk.on{border-color:var(--neon);color:var(--neon);background:rgba(0,255,65,.12);box-shadow:0 0 14px rgba(0,255,65,.5),inset 0 0 8px rgba(0,255,65,.08);}
.kk.hit{border-color:var(--gold);color:var(--gold);background:rgba(212,160,23,.25);box-shadow:0 0 14px rgba(212,160,23,.5);}

#result-flash{position:absolute;top:36%;left:50%;transform:translate(-50%,-50%);font-family:'Press Start 2P',monospace;font-size:34px;pointer-events:none;opacity:0;text-shadow:0 0 24px currentColor;z-index:20;text-align:center;}
#result-sub{font-size:9px;margin-top:6px;opacity:.85;}
#pp-flash{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-family:'Press Start 2P',monospace;font-size:10px;color:var(--neon);background:rgba(0,255,65,.1);border:1px solid var(--neon);padding:5px 12px;pointer-events:none;opacity:0;transition:opacity .5s;z-index:25;}
#ms-flash{position:absolute;top:46px;left:50%;transform:translateX(-50%);font-family:'Press Start 2P',monospace;font-size:9px;color:var(--gold);pointer-events:none;opacity:0;transition:opacity .5s;z-index:25;}

/* Overlay */
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(1,4,9,.94);z-index:30;overflow-y:auto;padding:16px 0;}
#overlay h1{font-family:'Press Start 2P',monospace;font-size:16px;color:var(--gold);margin-bottom:12px;text-shadow:0 0 18px rgba(212,160,23,.5);}
.ov-sub{color:var(--muted);font-size:10px;margin-bottom:12px;text-align:center;max-width:320px;line-height:1.9;}
.big-score{font-family:'Press Start 2P',monospace;font-size:32px;color:var(--neon);margin:8px 0;text-shadow:0 0 18px rgba(0,255,65,.5);}
.big-score-lbl{font-size:10px;color:var(--muted);margin-bottom:12px;}
.start-btn{font-family:'Press Start 2P',monospace;font-size:11px;padding:11px 26px;background:transparent;border:2px solid var(--neon);color:var(--neon);cursor:pointer;letter-spacing:1px;transition:all .15s;}
.start-btn:hover{background:rgba(0,255,65,.1);box-shadow:0 0 18px rgba(0,255,65,.3);}
#name-inp{font-family:'Fira Code',monospace;font-size:13px;padding:8px 12px;background:#010409;border:1px solid var(--border);color:var(--text);margin-bottom:10px;text-align:center;width:196px;}
#name-inp:focus{outline:none;border-color:var(--neon);}
.ov-lbl{font-size:9px;color:var(--dim);margin-bottom:5px;letter-spacing:1px;}
.ov-btn{font-family:'Press Start 2P',monospace;font-size:9px;padding:7px 14px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s;}
.ov-btn:hover,.ov-btn.active{border-color:var(--neon);color:var(--neon);background:rgba(0,255,65,.07);}

/* Team grid */
#team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px;width:300px;}
.team-btn{font-family:'Press Start 2P',monospace;font-size:7px;padding:9px 4px 7px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;width:100%;transition:all .12s;letter-spacing:.5px;}
.team-btn:hover{border-color:var(--muted);color:var(--text);}
.team-btn.active{color:#fff;}
.team-flag{font-size:20px;line-height:1;}
.team-abbr{font-size:6px;letter-spacing:1px;}

/* Leaderboard */
#lb-panel{width:212px;background:#010409;border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
#lb-hdr{padding:10px 12px;border-bottom:1px solid var(--border);font-size:10px;color:var(--neon);letter-spacing:1px;}
#lb-list{flex:1;overflow-y:auto;padding:8px;}
#lb-list::-webkit-scrollbar{width:3px;}
#lb-list::-webkit-scrollbar-thumb{background:var(--border);}
.lb-row{display:flex;align-items:center;gap:8px;padding:5px 4px;border-bottom:1px solid rgba(255,255,255,.03);font-size:11px;}
.lb-rank{color:var(--dim);width:18px;text-align:right;flex-shrink:0;}
.lb-rank.g{color:var(--gold)}.lb-rank.s{color:#aaa}.lb-rank.b{color:#cd7f32}
.lb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-sc{color:var(--cyan);font-weight:600;flex-shrink:0;}
.lb-me{color:var(--neon)!important;}
#stat-bar{padding:7px 12px;border-bottom:1px solid var(--border);font-size:10px;color:var(--dim);}
#stat-bar span{color:var(--muted);}
#ball-hist{padding:7px 12px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:3px;}
.bd{width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;font-family:'Press Start 2P',monospace;}
.bd.six{background:var(--neon);color:#000}.bd.four{background:var(--blue);color:#000}
.bd.r1,.bd.r2,.bd.r3{background:var(--muted);color:#000}
.bd.r0{background:var(--dim);color:var(--text)}.bd.wkt{background:var(--red);color:#fff}
@media(max-width:600px){#lb-panel{display:none;}.kk{width:48px;height:46px;}#sc-batter-wrap{display:none;}}
</style>
</head>

  document.querySelectorAll('.team-btn').forEach(b => {
    b.classList.remove('active');
    b.style.borderColor = '';
    b.style.boxShadow = '';
  });

  el.style.borderColor = t.color;
  el.style.boxShadow = `0 0 12px ${t.color}55`;

function selectOvers(n) {

  document.querySelectorAll('.ov-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('ov-' + n);

// ── Ball types ──
const BDEFS = {
  normal:  {name:'GOOD LENGTH',col:'#c9d1d9',speed:1.00,good:['d','a'],   bad:[]},
  bouncer: {name:'BOUNCER',    col:'#f85149',speed:1.10,good:['w','a'],   bad:['d']},
  yorker:  {name:'YORKER',     col:'#f778ba',speed:1.15,good:['d'],       bad:['w','a']},
  fulltoss:{name:'FULL TOSS',  col:'#d4a017',speed:0.85,good:['w','d','a'],bad:[]},
  spinner: {name:'SPINNER',    col:'#39c5cf',speed:0.65,good:['d','s'],   bad:['w']},
};

function pickBallType() {
  const over = Math.floor(G.balls / 6);
  const r = Math.random();
  if (over >= G.totalOvers - 4)
    return r<.30?'yorker':r<.50?'bouncer':r<.65?'fulltoss':'normal';
  if (over >= Math.floor(G.totalOvers*0.5))
    return r<.18?'bouncer':r<.36?'spinner':r<.50?'yorker':'normal';
  return r<.12?'bouncer':r<.25?'spinner':r<.36?'fulltoss':'normal';
}

// ── Fielders ──
function setFielding() {
  const over = Math.floor(G.balls / 6);
  if (G.powerplay)
    G.fielders = [.08,.20,.35,.50,.65,.80,.92,.14,.58];
  else if (over >= G.totalOvers - 4)
    G.fielders = [.03,.10,.18,.28,.38,.50,.62,.74,.86,.94,.01];
  else {
    const rr = G.balls>0?(G.runs/G.balls)*6:0;
    G.fielders = rr>10
      ?[.03,.12,.23,.36,.50,.64,.77,.88,.96,.07,.45]
      :[.08,.20,.34,.48,.62,.76,.90,.15,.55];
  }
}

// ── Timing — width scaled by player timing stat ──
function timingQuality(ballY) {
  const dist = Math.abs(ballY - bty());
  const t = G.currentBatter ? G.currentBatter.timing : 1.0;
  if (dist <= 22*t)  return 0;
  if (dist <= 52*t)  return 1;
  if (dist <= 90*t)  return 2;
  if (dist <= 155*t) return 3;
  return 4;
}

// ── Result — modified by player power + aggression ──
function calcResult(key, ballType, timing) {
  const def = BDEFS[ballType] || BDEFS.normal;
  const isGood = def.good.includes(key);
  const isBad  = def.bad.includes(key);
  const p = G.currentBatter || {power:1,timing:1,aggression:1};

  // Effective timing: power stat can bump up or down
  let eff = timing;
  if (p.power > 1.0 && Math.random() < (p.power-1.0)*1.2) eff = Math.max(0, eff-1);
  if (p.power < 1.0 && Math.random() < (1.0-p.power)*1.2) eff = Math.min(4, eff+1);

  const baseOut = {w:.14, a:.08, d:.07, s:.01};
  let out = (baseOut[key] ?? .08) * p.aggression;
  if (isBad)   out *= 3.0;
  if (isGood)  out *= 0.45;
  if (G.powerplay) out *= 0.70;
  out *= (1 + Math.max(0, eff-1)*0.30);
  if (eff >= 4) out = key==='s' ? 0.04 : 0.60;

  if (Math.random() < out) {
    const t = key==='w'?'caught':key==='s'?'lbw':Math.random()<.5?'caught':'bowled';
    return {out:true, type:t, runs:0};
  }

  const rt = {w:[6,4,4,0,0],a:[4,3,2,1,0],d:[4,4,2,1,0],s:[1,0,0,0,0]};
  let runs = (rt[key]||rt.d)[Math.min(eff,4)];
  if (isBad && runs>1) runs = Math.max(0, runs-2);

  const inDeath = Math.floor(G.balls/6) >= G.totalOvers-4;
  if (!G.powerplay && runs===4 && Math.random()<(inDeath?.12:.20)) runs=Math.floor(Math.random()*3)+1;
  if (runs===6 && Math.random()<.08) runs=4;
  return {out:false, runs};
}

function cmtPlayer(key) {

  const lines = CMT[key];

// ── START ──
function startGame() {
  if (!selectedTeamId) { alert('Select a team first!'); return; }
  const ni = document.getElementById('name-inp');
  G.playerName = (ni?ni.value.trim():'')||'batter';
  G.teamId = selectedTeamId;
  const team = TEAMS[G.teamId];
  G.teamColor = team.color;
  G.battingOrder = [...team.players];
  G.batterIdx = 0;
  G.currentBatter = G.battingOrder[0];
  G.batterRuns = 0;

  G.runs=0; G.wickets=0; G.balls=0;
  G.ballHistory=[];
  G.crowdEnergy=30;
  G.totalOvers=selectedOvers;
  G.powerplay=true;
  G.halfCentury=false; G.century=false;
  G.combo=0;
  G.particles=[]; G.ballTrail=[];
  G.boundaryFlash=0; G.impactFlash=0;
  G.shakeX=0; G.shakeY=0;
  G.phase='ready';
  G.ballType=pickBallType();
  setFielding();
  updateSB();
  document.getElementById('overlay').style.display='none';
  showPP('POWERPLAY — open field');
  setComment(cmt('pp_start'));
  keysReady();
  showLabel(G.ballType);
  cancelAnimationFrame(_raf);
  _raf=requestAnimationFrame(loop);
  scheduleBowl();
}

// ── Delivery pipeline ──
function scheduleBowl() {
  clearTimeout(_bowlTimeout);
  _bowlTimeout=setTimeout(releaseBall,700);
}

function releaseBall() {
  if (G.phase!=='ready') return;
  G.phase='in_flight';
  const def=BDEFS[G.ballType]||BDEFS.normal;
  G.ballDuration=1080/def.speed;
  G.ballStartTime=performance.now();
  G.ballX=cx(); G.ballY=bwy();
  G.shotDone=false; G.hitActive=false; G.batSwing=false;
  G.ballTrail=[]; G.bowlerAnim=0;
  setComment(cmt('ball_'+G.ballType));
  hideLabel();
}

// ── Input ──
document.addEventListener('keydown', e=>{
  const k=e.key.toLowerCase();
  if ('wasd'.includes(k)&&k.length===1){e.preventDefault();pressShot(k);}
});

window.pressShot=function(k){
  if (!['w','a','s','d'].includes(k)) return;
  if (G.phase!=='in_flight'||G.shotDone) return;
  const timing=timingQuality(G.ballY);
  if (timing===4&&G.ballY<bty()-210){setComment(cmt('miss_early'));flashKey(k,'bad');return;}
  G.shotDone=true; G.batSwing=true; G.batDir=k; G.batT=0;
  flashKey(k,'hit');
  G.impactFlash=timing===0?0.7:timing===1?0.45:0.25;
  setTimeout(()=>resolveShot(k,timing),120);
};

function resolveShot(k, timing) {
  if (G.phase==='gameover') return;
  G.balls++;
  const res=calcResult(k,G.ballType,timing);
  G.phase='resolving';
  const bname=G.currentBatter?G.currentBatter.name:'batter';

  if (res.out) {
    G.wickets++;
    G.combo=0;
    G.crowdEnergy=Math.max(10,G.crowdEnergy-30);
    const ok='out_'+res.type;
    setComment(`${cmt(CMT[ok]?ok:'out_caught')} — ${bname} ${res.type}`);
    showFlash('OUT!','var(--red)',bname+' '+res.type.toUpperCase()+'!');
    addDot('wkt','W');
    updateSB();
    launchBall(k,0);

    // Advance batter
    G.batterIdx++;
    if (G.batterIdx<G.battingOrder.length) {
      const next=G.battingOrder[G.batterIdx];
      G.currentBatter=next;
      G.batterRuns=0;
      setTimeout(()=>{
        showMS(next.name+' to the crease');
        setComment(`BENAUD: ${next.name} to the crease.`);
      }, 600);
    }

    if (G.wickets>=10){setTimeout(endGame,1200);return;}
    setTimeout(nextBall,1000);
  } else {
    G.runs+=res.runs;
    G.batterRuns+=res.runs;
    G.combo=res.runs>=4?G.combo+1:0;
    G.crowdEnergy=Math.min(100,G.crowdEnergy+res.runs*5+(res.runs>=6?15:0));
    const ck=['dot','one','two','three','four','six'][Math.min(res.runs,5)]||'dot';
    if (res.runs>=4) {
      setComment(cmt(ck)+` — ${bname}!`);
    } else {
      setComment(cmt(ck));
    }
    if (G.combo>=2) setTimeout(()=>setComment(cmt(G.combo>=4?'streak4':G.combo===3?'streak3':'streak2')),600);
    const ft=res.runs>=6?'SIX!':res.runs>=4?'FOUR!':res.runs>0?'+'+res.runs:'·';
    const fc=res.runs>=6?'var(--neon)':res.runs>=4?'var(--gold)':res.runs>0?'var(--cyan)':'var(--dim)';
    showFlash(ft,fc);
    const dt=res.runs>=6?'six':res.runs>=4?'four':res.runs>0?'r'+res.runs:'r0';
    addDot(dt,res.runs===0?'·':res.runs);
    updateSB();
    checkMilestones();
    launchBall(k,res.runs);
    if (res.runs>=4){
      G.boundaryFlash=1.0;
      G.boundaryCol=res.runs>=6?'0,255,65':'255,165,0';
      if (res.runs>=6){G.shakeX=6;G.shakeY=4;}
      spawnParticles(G.hitStartX,G.hitStartY,res.runs);
    } else if (res.runs>0){
      spawnParticles(G.hitStartX,G.hitStartY,res.runs);
    }
    const maxB=G.totalOvers*6;
    if (G.balls>=maxB){setTimeout(endGame,1200);return;}
    setTimeout(nextBall,800);
  }
}

function checkMiss() {
  if (G.phase!=='in_flight'||G.shotDone) return;
  if (G.ballY>bty()+40) {
    G.shotDone=true; G.balls++; G.phase='resolving'; G.combo=0;
    if (Math.random()<0.50) {
      G.wickets++;
      const type=Math.random()<.6?'bowled':'lbw';
      const bname=G.currentBatter?G.currentBatter.name:'batter';
      setComment(cmt('out_'+type)+' — '+bname);
      showFlash('OUT!','var(--red)',type==='bowled'?'BOWLED!':'LBW!');
      addDot('wkt','W'); updateSB();

      G.batterIdx++;
      if (G.batterIdx<G.battingOrder.length){
        const next=G.battingOrder[G.batterIdx];
        G.currentBatter=next; G.batterRuns=0;
        setTimeout(()=>{showMS(next.name+' to the crease');},600);
      }
      if (G.wickets>=10){setTimeout(endGame,1200);return;}
      setTimeout(nextBall,1000);
    } else {
      setComment(cmt('dot')); showFlash('·','var(--dim)');
      addDot('r0','·'); updateSB();
      if (G.balls>=G.totalOvers*6){setTimeout(endGame,1000);return;}
      setTimeout(nextBall,750);
    }
  }
}

// ── Launch hit ball ──
function launchBall(k, runs) {
  G.hitActive=true; G.ballTrail=[];
  G.hitStartX=cx(); G.hitStartY=bty()-20;
  G.hitStartTime=performance.now();
  const angles={w:-Math.PI/2,a:-Math.PI*0.78,d:-Math.PI*0.22,s:Math.PI*0.55};
  const angle=angles[k]??-Math.PI/2;
  const ca=Math.cos(angle),sa=Math.sin(angle);

  if (runs===0){G.hitTargetX=G.hitStartX+ca*30;G.hitTargetY=G.hitStartY+sa*30;G.hitDuration=260;return;}

  const fcx=cx(),fcy=H*0.48,rx=FRX(),ry=FRY();
  const dx0=G.hitStartX-fcx,dy0=G.hitStartY-fcy;
  const A=(ca*ca)/(rx*rx)+(sa*sa)/(ry*ry);
  const B=2*(dx0*ca/(rx*rx)+dy0*sa/(ry*ry));
  const C=(dx0*dx0)/(rx*rx)+(dy0*dy0)/(ry*ry)-1;
  const disc=B*B-4*A*C;
  const bdist=disc>=0?(-B+Math.sqrt(Math.max(0,disc)))/(2*A):rx*0.7;

  const frac=runs>=6?1.28:runs===5?1.10:runs===4?0.95:runs===3?0.68:runs===2?0.48:0.28;
  const dist=bdist*frac;
  G.hitTargetX=G.hitStartX+ca*dist;
  G.hitTargetY=G.hitStartY+sa*dist;
  const pxPerMs=runs>=6?1.2:runs>=4?1.0:runs>=2?0.70:0.52;
  G.hitDuration=Math.max(220,dist/pxPerMs);
}

function nextBall() {
  if (G.phase==='gameover') return;
  G.phase='ready'; G.shotDone=false; G.hitActive=false; G.batSwing=false;
  G.ballTrail=[]; G.ballX=cx(); G.ballY=bwy();

  const over=Math.floor(G.balls/6), deathStart=G.totalOvers-4;
  if (G.powerplay&&over>=1){G.powerplay=false;showPP('POWERPLAY OVER — fielders spread');setComment(cmt('pp_end'));}
  if (over===deathStart&&G.balls%6===0){showPP('DEATH OVERS — go big');setComment(cmt('death'));}

  G.ballType=pickBallType(); setFielding(); updateSB(); keysReady(); showLabel(G.ballType); scheduleBowl();
}

function checkMilestones() {
  const n=G.currentBatter?G.currentBatter.name:'batter';
  if (!G.halfCentury&&G.runs>=50){G.halfCentury=true;showMS('★ FIFTY!');setComment(`${cmt('fifty')} — ${n}`);}
  if (!G.century&&G.runs>=100){G.century=true;showMS('★★ CENTURY!!');setComment(`${cmt('century')} — ${n}`);G.crowdEnergy=100;}
  if (G.batterRuns>=50&&G.batterRuns%50===0&&G.batterRuns>0){
    showMS(`${n} ${G.batterRuns}!`);
  }
  if (G.runs>=150&&G.runs%50===0){showMS('★★★ '+G.runs+'!');setComment("WARNE: "+G.runs+"!");}
}

function endGame(){G.phase='gameover';saveScore();showGameOver();}

  const team=TEAMS[G.teamId];

  // Top scorers from this innings
  const scored=G.battingOrder.slice(0,G.batterIdx+1).map((p,i)=>{
    if (i<G.batterIdx) return `${p.name}: OUT`;
    return `${p.name}: ${G.batterRuns}*`;
  }).slice(-4).join(' &nbsp;·&nbsp; ');

  ov.innerHTML=`
    <h1>${team.flag} ${team.abbr}</h1>

    <div style="font-size:9px;color:var(--gold);margin-bottom:14px;">${grade}</div>
    <div class="ov-lbl" style="margin-top:4px;">select team</div>
    <div id="team-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;width:300px;">
      <button class="team-btn" id="tbtn-aus" onclick="selectTeam('aus')"><span class="team-flag">🇦🇺</span><span class="team-abbr">AUS</span></button>
      <button class="team-btn" id="tbtn-ind" onclick="selectTeam('ind')"><span class="team-flag">🇮🇳</span><span class="team-abbr">IND</span></button>
      <button class="team-btn" id="tbtn-eng" onclick="selectTeam('eng')"><span class="team-flag">🏴󠁧󠁢󠁥󠁮󠁧󠁿</span><span class="team-abbr">ENG</span></button>
      <button class="team-btn" id="tbtn-wi"  onclick="selectTeam('wi')"><span class="team-flag">🌴</span><span class="team-abbr">WI</span></button>
      <button class="team-btn" id="tbtn-pak" onclick="selectTeam('pak')"><span class="team-flag">🇵🇰</span><span class="team-abbr">PAK</span></button>
      <button class="team-btn" id="tbtn-nz"  onclick="selectTeam('nz')"><span class="team-flag">🇳🇿</span><span class="team-abbr">NZ</span></button>

// ── Scoreboard ──
function updateSB() {
  document.getElementById('sc-runs').textContent=G.runs;
  document.getElementById('sc-wkts').textContent=G.wickets;
  document.getElementById('sc-overs').textContent=fmtOv(G.balls);
  document.getElementById('sc-rr').textContent=G.balls>0?((G.runs/G.balls)*6).toFixed(2):'0.00';
  const bel=document.getElementById('sc-batter');
  const bsc=document.getElementById('sc-batter-score');
  if (G.currentBatter&&bel) {
    bel.textContent=G.currentBatter.name;
    bel.style.color=G.teamColor;
    if (bsc) bsc.textContent=G.batterRuns+'*';
  }
}
function fmtOv(b){return Math.floor(b/6)+'.'+b%6;}

// ── UI ──
function keysReady(){document.querySelectorAll('.kk').forEach(k=>k.classList.remove('on','hit','bad'));}
function keysOn(){document.querySelectorAll('.kk').forEach(k=>{k.classList.remove('bad');k.classList.add('on');});}
function flashKey(k,cls){const el=document.getElementById('kk-'+k);if(!el)return;el.classList.remove('on','bad','hit');el.classList.add(cls);setTimeout(()=>el.classList.remove(cls),400);}
function showLabel(type){const def=BDEFS[type]||BDEFS.normal;const el=document.getElementById('ball-label');el.textContent=def.name;el.style.color=def.col;el.style.borderColor=def.col;el.style.background=def.col+'18';el.classList.add('show');}
function hideLabel(){document.getElementById('ball-label').classList.remove('show');}
function showFlash(txt,col,sub){const el=document.getElementById('result-flash');el.style.color=col;el.childNodes[0].textContent=txt;const s=document.getElementById('result-sub');if(s)s.textContent=sub||'';el.style.opacity='1';el.style.transform='translate(-50%,-50%) scale(1.18)';el.style.transition='none';setTimeout(()=>{el.style.transition='opacity .55s,transform .55s';el.style.opacity='0';el.style.transform='translate(-50%,-62%) scale(.88)';},600);}
function showPP(msg){const e=document.getElementById('pp-flash');e.textContent=msg;e.style.opacity='1';setTimeout(()=>e.style.opacity='0',3000);}
function showMS(msg){const e=document.getElementById('ms-flash');e.textContent=msg;e.style.opacity='1';setTimeout(()=>e.style.opacity='0',2600);}
function addDot(type,lbl){const h=document.getElementById('ball-hist');if(G.balls%6===1&&G.balls>1){const s=document.createElement('div');s.style.cssText='width:100%;height:1px;background:var(--border);margin:2px 0;';h.appendChild(s);}const d=document.createElement('div');d.className='bd '+type;d.textContent=lbl;h.appendChild(d);h.scrollTop=h.scrollHeight;}

// ── Leaderboard ──
async function saveScore(){
  if(!G.runs)return;
  const team=TEAMS[G.teamId];
  try{await db.collection('cricket_scores').add({name:G.playerName,runs:G.runs,wickets:G.wickets,balls:G.balls,team:team.abbr,ts:Date.now()});loadLB();}catch(e){}
}
async function loadLB(){
  try{
    const snap=await db.collection('cricket_scores').orderBy('runs','desc').limit(20).get();
    const list=document.getElementById('lb-list');list.innerHTML='';
    const scores=[];snap.forEach(d=>scores.push(d.data()));
    scores.forEach((s,i)=>{
      const el=document.createElement('div');el.className='lb-row';
      const rc=i===0?'g':i===1?'s':i===2?'b':'';const me=s.name===G.playerName;
      const tf=s.team?` <span style="font-size:8px;color:var(--dim)">[${s.team}]</span>`:'';
      el.innerHTML=`<span class="lb-rank ${rc}">${i+1}</span><span class="lb-name ${me?'lb-me':''}">${s.name}${tf}</span><span class="lb-sc ${me?'lb-me':''}">${s.runs}</span>`;
      list.appendChild(el);
    });
    const mine=scores.filter(s=>s.name===G.playerName);
    if(mine.length){document.getElementById('stat-best').textContent=Math.max(...mine.map(s=>s.runs));document.getElementById('stat-avg').textContent=Math.round(mine.reduce((a,s)=>a+s.runs,0)/mine.length);}
  }catch(e){}
}
loadLB();

// ── Particles ──
function spawnParticles(x,y,runs){
  const cols=runs>=6?['#00ff41','#60ff90','#fff']:runs>=4?['#d4a017','#ffcc44','#fff8dc']:['#58a6ff','#80c0ff'];
  const n=runs>=6?24:runs>=4?16:10;
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,spd=2+Math.random()*(runs>=4?7:3.5);G.particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,col:cols[i%cols.length]});}
}
function drawParticles(){
  G.particles=G.particles.filter(p=>p.life>0);
  G.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.90;p.vy*=0.90;p.life-=0.030;ctx.globalAlpha=p.life*p.life;ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2);ctx.fillStyle=p.col;ctx.fill();if(p.life>0.55){ctx.strokeStyle=p.col;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.x-p.vx*1.5,p.y-p.vy*1.5);ctx.lineTo(p.x,p.y);ctx.stroke();}});
  ctx.globalAlpha=1;
}

// ── Drawing ──
function lerp(a,b,t){return a+(b-a)*Math.max(0,Math.min(1,t));}

function drawField(){
  const fcx=cx(),fcy=H*0.48,rx=FRX(),ry=FRY(),now=performance.now();
  ctx.beginPath();ctx.ellipse(fcx,fcy,rx*1.30,ry*1.30,0,0,Math.PI*2);ctx.fillStyle='#070707';ctx.fill();
  for(let ring=0;ring<3;ring++){
    const rr=rx*(1.08+ring*0.07),rry=ry*(1.08+ring*0.07),n=52+ring*24;
    for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2,wave=Math.sin(i*0.7+now*0.001*(G.crowdEnergy/40))*(G.crowdEnergy/100)*4;ctx.beginPath();ctx.arc(fcx+Math.cos(a)*(rr+wave),fcy+Math.sin(a)*(rry+wave),1.9,0,Math.PI*2);ctx.fillStyle=`hsla(${(i*17+ring*60)%360},55%,58%,0.65)`;ctx.fill();}
  }
  ctx.save();ctx.beginPath();ctx.ellipse(fcx,fcy,rx,ry,0,0,Math.PI*2);ctx.clip();
  for(let i=0;i<18;i++){const sy=fcy-ry+(i*ry*2/18),sh=ry*2/18;ctx.fillStyle=i%2===0?'#1b7220':'#175c1c';ctx.fillRect(fcx-rx,sy,rx*2,sh);}
  const lg=ctx.createRadialGradient(fcx,fcy-ry*0.25,0,fcx,fcy,rx*1.1);lg.addColorStop(0,'rgba(255,255,220,0.07)');lg.addColorStop(0.55,'rgba(0,0,0,0)');lg.addColorStop(1,'rgba(0,0,0,0.20)');ctx.fillStyle=lg;ctx.fillRect(fcx-rx,fcy-ry,rx*2,ry*2);
  ctx.restore();
  ctx.beginPath();ctx.ellipse(fcx,fcy,rx*0.52,ry*0.52,0,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,0.13)';ctx.lineWidth=1.5;ctx.setLineDash([5,5]);ctx.stroke();ctx.setLineDash([]);
  if(G.boundaryFlash>0){G.boundaryFlash=Math.max(0,G.boundaryFlash-0.022);ctx.save();ctx.beginPath();ctx.ellipse(fcx,fcy,rx*0.97,ry*0.97,0,0,Math.PI*2);ctx.strokeStyle=`rgba(${G.boundaryCol},${G.boundaryFlash})`;ctx.lineWidth=7+G.boundaryFlash*10;ctx.shadowBlur=30*G.boundaryFlash;ctx.shadowColor=`rgba(${G.boundaryCol},1)`;ctx.stroke();ctx.restore();}
  ctx.beginPath();ctx.ellipse(fcx,fcy,rx*0.96,ry*0.96,0,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,0.32)';ctx.lineWidth=2.5;ctx.stroke();
  for(let i=0;i<60;i+=3){const a=(i/60)*Math.PI*2;ctx.beginPath();ctx.arc(fcx+Math.cos(a)*rx*0.96,fcy+Math.sin(a)*ry*0.96,1.8,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.35)';ctx.fill();}
}

function drawPitch(){
  const topW=18,botW=32,pTop=bwy()-8,pBot=bty()+22,pcx=cx();
  ctx.beginPath();ctx.moveTo(pcx-topW/2,pTop);ctx.lineTo(pcx+topW/2,pTop);ctx.lineTo(pcx+botW/2,pBot);ctx.lineTo(pcx-botW/2,pBot);ctx.closePath();
  const pg=ctx.createLinearGradient(pcx-botW,pTop,pcx+botW,pBot);pg.addColorStop(0,'rgba(210,182,105,0.42)');pg.addColorStop(0.5,'rgba(198,162,82,0.38)');pg.addColorStop(1,'rgba(190,155,78,0.44)');ctx.fillStyle=pg;ctx.fill();
  ctx.strokeStyle='rgba(200,170,90,0.45)';ctx.lineWidth=1;ctx.stroke();
  ctx.strokeStyle='rgba(155,125,55,0.22)';ctx.lineWidth=0.5;
  for(let i=1;i<9;i++){const r=i/9,y=pTop+(pBot-pTop)*r,hw=lerp(topW,botW,r)/2;ctx.beginPath();ctx.moveTo(pcx-hw+2,y);ctx.lineTo(pcx+hw-2,y);ctx.stroke();}
  ctx.strokeStyle='rgba(255,255,255,0.80)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(pcx-botW/2-6,bty()+10);ctx.lineTo(pcx+botW/2+6,bty()+10);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pcx-topW/2-4,bwy()-4);ctx.lineTo(pcx+topW/2+4,bwy()-4);ctx.stroke();
}

function drawStumps(x,y,size){
  ctx.strokeStyle='rgba(0,0,0,0.28)';ctx.lineWidth=3;ctx.lineCap='butt';
  for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(x+i*(size/3)+1,y+2);ctx.lineTo(x+i*(size/3)+1,y-size+2);ctx.stroke();}
  ctx.strokeStyle='rgba(255,245,200,0.92)';ctx.lineWidth=2.5;ctx.lineCap='round';
  for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(x+i*(size/3),y);ctx.lineTo(x+i*(size/3),y-size);ctx.stroke();}
  ctx.strokeStyle='rgba(255,245,200,0.65)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x-size/3-1,y-size+2);ctx.lineTo(x+size/3+1,y-size+2);ctx.stroke();
}

function drawFielders(){
  const fcx=cx(),fcy=H*0.48,rx=FRX()*0.88,ry=FRY()*0.88;
  const teamColor=G.teamColor||'#58a6ff';
  G.fielders.forEach((pos,i)=>{
    const a=pos*Math.PI*2-Math.PI/2,fx=fcx+Math.cos(a)*rx,fy=fcy+Math.sin(a)*ry;
    ctx.globalAlpha=0.22;ctx.beginPath();ctx.ellipse(fx+2,fy+9,5,2.5,0,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();ctx.globalAlpha=1;
    ctx.beginPath();ctx.ellipse(fx,fy+2,5,7,0,0,Math.PI*2);ctx.fillStyle='rgba(235,235,240,0.93)';ctx.fill();ctx.strokeStyle='rgba(170,170,185,0.45)';ctx.lineWidth=0.5;ctx.stroke();
    ctx.beginPath();ctx.arc(fx,fy-6,5.5,0,Math.PI*2);ctx.fillStyle=teamColor;ctx.fill();ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=0.8;ctx.stroke();
    ctx.beginPath();ctx.arc(fx,fy-5.5,3,0,Math.PI*2);ctx.fillStyle='#e8c080';ctx.fill();
  });
}

function drawBowler(ballT){
  const x=cx(),runT=Math.min(ballT*2.5,1),y=lerp(bwy()-70,bwy()+5,runT),bob=Math.sin(runT*Math.PI*6)*2.5;
  ctx.globalAlpha=0.18;ctx.beginPath();ctx.ellipse(x+2,y+18,6,2.5,0,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();ctx.globalAlpha=1;
  ctx.strokeStyle='rgba(255,100,80,0.85)';ctx.lineWidth=2;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(x,y+bob-12,6,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(x,y+bob-13,4,Math.PI,0);ctx.fillStyle='rgba(255,70,50,0.65)';ctx.fill();
  ctx.beginPath();ctx.moveTo(x,y+bob-6);ctx.lineTo(x,y+bob+6);ctx.stroke();
  const as=Math.cos(runT*Math.PI*6)*7;
  ctx.beginPath();ctx.moveTo(x,y+bob-2);ctx.lineTo(x-10+as,y+bob+2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,y+bob-2);ctx.lineTo(x+10-as,y+bob-4);ctx.stroke();
  const ls=Math.sin(runT*Math.PI*6)*7;
  ctx.beginPath();ctx.moveTo(x,y+bob+6);ctx.lineTo(x-6+ls,y+bob+16);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,y+bob+6);ctx.lineTo(x+6-ls,y+bob+16);ctx.stroke();
  if(ballT>0.3&&ballT<0.6){const armT=(ballT-0.3)/0.3,armA=lerp(-Math.PI*0.9,Math.PI*0.1,armT);ctx.strokeStyle='rgba(255,120,80,0.9)';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(x,y+bob-3);ctx.lineTo(x+Math.cos(armA)*18,y+bob-3+Math.sin(armA)*18);ctx.stroke();}
}

function drawBatter(swingDir,swingT){
  const x=cx(),y=bty(),col=G.teamColor||'#00ff41';
  ctx.globalAlpha=0.18;ctx.beginPath();ctx.ellipse(x+3,y+8,9,3,0,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();ctx.globalAlpha=1;
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(x,y-28,7,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(x,y-29,5,Math.PI,0);ctx.fillStyle=col+'80';ctx.fill();
  ctx.beginPath();ctx.moveTo(x,y-21);ctx.lineTo(x,y-6);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,y-6);ctx.lineTo(x-8,y+6);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,y-6);ctx.lineTo(x+8,y+6);ctx.stroke();

  let batAngle;
  if(!swingDir){batAngle=Math.PI*0.5;}
  else{const targets={w:-Math.PI*0.6,a:-Math.PI*0.1,d:-Math.PI*0.9,s:Math.PI*0.5};const target=targets[swingDir]??Math.PI*0.5;const eased=swingT<0.5?swingT*2:1-(swingT-0.5)*2;batAngle=lerp(Math.PI*0.5,target,eased);}
  const armLen=14,ax=x+Math.cos(batAngle-Math.PI*0.3)*armLen,ay=y-16+Math.sin(batAngle-Math.PI*0.3)*armLen;
  ctx.beginPath();ctx.moveTo(x,y-16);ctx.lineTo(ax,ay);ctx.stroke();
  ctx.lineCap='butt';ctx.strokeStyle='#c8a050';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax+Math.cos(batAngle)*18,ay+Math.sin(batAngle)*18);ctx.stroke();
  ctx.strokeStyle='rgba(255,220,130,0.55)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax+Math.cos(batAngle)*18,ay+Math.sin(batAngle)*18);ctx.stroke();
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.lineCap='round';
}

function drawBall(bx,by,sizeMult){
  const r=5+(sizeMult||1)*3.5;
  const g=ctx.createRadialGradient(bx,by,1,bx,by,r*2.2);g.addColorStop(0,'rgba(230,60,30,0.55)');g.addColorStop(1,'rgba(230,60,30,0)');ctx.beginPath();ctx.arc(bx,by,r*2.2,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  const bg=ctx.createRadialGradient(bx-r*0.3,by-r*0.3,r*0.1,bx,by,r);bg.addColorStop(0,'#e83520');bg.addColorStop(0.55,'#cc2211');bg.addColorStop(1,'#7a0c06');ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();ctx.strokeStyle='#5a0804';ctx.lineWidth=0.8;ctx.stroke();
  ctx.beginPath();ctx.arc(bx,by,r,0.2,Math.PI-0.2);ctx.strokeStyle='rgba(255,215,195,0.35)';ctx.lineWidth=1.2;ctx.stroke();
  ctx.beginPath();ctx.arc(bx-r*0.35,by-r*0.35,r*0.32,0,Math.PI*2);ctx.fillStyle='rgba(255,200,180,0.55)';ctx.fill();
}

function drawTrail(alpha){
  const n=G.ballTrail.length;
  G.ballTrail.forEach((p,i)=>{const a=(i/n)*(alpha||0.45),r=1.5+(i/n)*4;ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fillStyle=`rgba(220,60,30,${a})`;ctx.fill();});
}

function drawTimingArc(ballY){
  const dist=Math.abs(ballY-bty());
  if(dist>200)return;
  const progress=Math.max(0,1-dist/200);
  const perfect=dist<=22*(G.currentBatter?G.currentBatter.timing:1);
  const good=dist<=52*(G.currentBatter?G.currentBatter.timing:1);
  const ok=dist<=90*(G.currentBatter?G.currentBatter.timing:1);
  const col=perfect?'#00ff41':good?'#ffcc00':ok?'#ff8c00':'rgba(255,255,255,0.25)';
  const pulse=0.5+0.5*Math.sin(performance.now()*0.018);
  const startA=Math.PI*0.15,endA=Math.PI*0.85,sweepA=startA+(endA-startA)*progress;
  const rad=32+(perfect?pulse*5:0);
  ctx.beginPath();ctx.arc(cx(),bty()-20,rad,Math.PI+startA,Math.PI+endA);ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=4;ctx.stroke();
  ctx.beginPath();ctx.arc(cx(),bty()-20,rad,Math.PI+startA,Math.PI+sweepA);ctx.strokeStyle=perfect?`rgba(0,255,65,${0.7+pulse*0.3})`:col;ctx.lineWidth=perfect?5:4;
  if(perfect){ctx.shadowBlur=14;ctx.shadowColor='#00ff41';}ctx.stroke();ctx.shadowBlur=0;
  if(progress>0.3){const tipA=Math.PI+sweepA,tx=cx()+Math.cos(tipA)*rad,ty=(bty()-20)+Math.sin(tipA)*rad;ctx.beginPath();ctx.arc(tx,ty,3,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();}
  if(dist<130) keysOn();
}

// ── MAIN DRAW ──
function drawScene(now){
  if(G.shakeX>0.3||G.shakeY>0.3){ctx.save();ctx.translate((Math.random()-0.5)*G.shakeX*2,(Math.random()-0.5)*G.shakeY*2);G.shakeX*=0.78;G.shakeY*=0.78;}
  ctx.clearRect(0,0,W,H);
  drawField();drawPitch();drawFielders();
  drawStumps(cx(),bty()+14,20);drawStumps(cx(),bwy()-2,14);
  drawBatter(G.batSwing?G.batDir:null,G.batT);

  if(G.phase==='in_flight'){
    const t=(now-G.ballStartTime)/G.ballDuration;
    G.ballX=cx()+getSpin(t,G.ballType);G.ballY=lerp(bwy(),bty()+40,t);
    drawBowler(t);
    if(!G.shotDone){drawTimingArc(G.ballY);checkMiss();}
    G.ballTrail.push({x:G.ballX,y:G.ballY});if(G.ballTrail.length>7)G.ballTrail.shift();
    drawTrail(0.35);drawBall(G.ballX,G.ballY,Math.min(t,1));
  } else if(G.phase==='resolving'&&G.hitActive){
    const elapsed=now-G.hitStartTime,rawT=Math.min(elapsed/G.hitDuration,1),t=1-Math.pow(1-rawT,2.5);
    G.hitX=lerp(G.hitStartX,G.hitTargetX,t);G.hitY=lerp(G.hitStartY,G.hitTargetY,t);
    if(rawT>=1)G.hitActive=false;
    G.ballTrail.push({x:G.hitX,y:G.hitY});if(G.ballTrail.length>12)G.ballTrail.shift();
    drawTrail(0.5);drawBall(G.hitX,G.hitY,1);
  } else {
    drawBowler(0);
  }

  if(G.phase==='ready'){
    const def=BDEFS[G.ballType]||BDEFS.normal;
    ctx.fillStyle=def.col+'cc';ctx.font='700 9px "Press Start 2P"';ctx.textAlign='center';
    ctx.fillText(def.name,cx(),bwy()-32);ctx.textAlign='left';
  }

  drawParticles();

  if(G.impactFlash>0){G.impactFlash=Math.max(0,G.impactFlash-0.08);ctx.fillStyle=`rgba(255,255,255,${G.impactFlash*0.35})`;ctx.fillRect(0,0,W,H);}
  if(G.batSwing){G.batT=Math.min(G.batT+0.10,1);if(G.batT>=1)G.batSwing=false;}
  if(G.shakeX>0.3||G.shakeY>0.3)ctx.restore();
}

function getSpin(t,type){if(type!=='spinner')return 0;return Math.sin(t*Math.PI)*14;}

function loop(now){if(G.phase==='idle'||G.phase==='gameover')return;drawScene(now);_raf=requestAnimationFrame(loop);}

function drawStatic(){resize();ctx.clearRect(0,0,W,H);drawField();drawPitch();drawFielders();drawStumps(cx(),bty()+14,20);drawStumps(cx(),bwy()-2,14);drawBatter(null,0);drawBowler(0);}
drawStatic();
</script>
